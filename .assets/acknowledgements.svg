<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="100%" height="80" style="background: transparent;">
  <style>
    @keyframes neonGlow {
      0% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
      50% { fill: #e8cfff; filter: drop-shadow(0 0 2px #8A2BE2) drop-shadow(0 0 15px #8A2BE2); }
      100% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.15); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
    }
    .text-title {
      font-size: 28px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      animation: neonGlow 3s ease-in-out infinite;
    }
    .heart {
      animation: beat 1.5s ease-in-out infinite;
      transform-origin: 480px 45px;
    }
  </style>
  <text x="20" y="48" class="text-title">🙏 Acknowledgements</text>
  <!-- Animated Heart Icon -->
  <path class="heart" fill="#FF007F" stroke="#00D2FF" stroke-width="2" d="M 480 60 C 480 60 460 48 460 37 C 460 30, 465 25, 472 25 C 476 25, 479 28, 480 30 C 481 28, 484 25, 488 25 C 495 25, 500 30, 500 37 C 500 48, 480 60, 480 60 Z" />
</svg>
