<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 70" width="100%" height="70" style="background: transparent;">
  <style>
    @keyframes neonGlow {
      0% {
        fill: #ffffff;
        filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF);
      }
      50% {
        fill: #e8cfff;
        filter: drop-shadow(0 0 2px #8A2BE2) drop-shadow(0 0 12px #8A2BE2) drop-shadow(0 0 20px #8A2BE2);
      }
      100% {
        fill: #ffffff;
        filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF);
      }
    }
    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-4px);
      }
      100% {
        transform: translateY(0px);
      }
    }
    .text-title {
      font-size: 38px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      text-anchor: middle;
      letter-spacing: 2px;
      animation: neonGlow 3s ease-in-out infinite, float 4s ease-in-out infinite;
      transform-origin: center;
    }
  </style>
  <text x="400" y="48" class="text-title">🎵 Devloper Sparrow 🎵</text>
</svg>
