<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="100%" height="80" style="background: transparent;">
  <style>
    @keyframes neonGlow {
      0% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
      50% { fill: #e8cfff; filter: drop-shadow(0 0 2px #8A2BE2) drop-shadow(0 0 15px #8A2BE2); }
      100% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .text-title {
      font-size: 28px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      animation: neonGlow 3s ease-in-out infinite;
    }
    .gear {
      animation: spin 6s linear infinite;
      transform-origin: 480px 45px;
    }
  </style>
  <text x="20" y="48" class="text-title">🤝 Contributing</text>
  <!-- Animated Gear Icon -->
  <g class="gear" fill="#8A2BE2" stroke="#00D2FF" stroke-width="2">
    <circle cx="480" cy="45" r="12" />
    <path d="M 480 25 L 480 30 M 480 60 L 480 65 M 460 45 L 465 45 M 495 45 L 500 45 M 466 31 L 470 35 M 490 55 L 494 59 M 466 59 L 470 55 M 490 31 L 494 35" stroke-width="4" stroke-linecap="round" />
    <circle cx="480" cy="45" r="5" fill="#090a0f" stroke="none" />
  </g>
</svg>
