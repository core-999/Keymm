<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="100%" height="80">
  <style>
    .bar {
      fill: #2E64FE;
      animation: bounce 0.8s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .bar:nth-child(odd) { fill: #8A2BE2; }
    .bar:nth-child(3n) { fill: #00D2FF; }

    .bar:nth-child(1) { animation-delay: 0.1s; }
    .bar:nth-child(2) { animation-delay: 0.4s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.6s; }
    .bar:nth-child(5) { animation-delay: 0.3s; }
    .bar:nth-child(6) { animation-delay: 0.5s; }
    .bar:nth-child(7) { animation-delay: 0.2s; }
    .bar:nth-child(8) { animation-delay: 0.7s; }
    .bar:nth-child(9) { animation-delay: 0.4s; }
    .bar:nth-child(10) { animation-delay: 0.1s; }
    .bar:nth-child(11) { animation-delay: 0.3s; }
    .bar:nth-child(12) { animation-delay: 0.5s; }
    .bar:nth-child(13) { animation-delay: 0.2s; }
    .bar:nth-child(14) { animation-delay: 0.7s; }
    .bar:nth-child(15) { animation-delay: 0.4s; }

    @keyframes bounce {
      0% {
        transform: scaleY(0.15);
      }
      100% {
        transform: scaleY(1.0);
      }
    }
  </style>
  <g transform="translate(0, 40)">
    <rect class="bar" x="5" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="18" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="31" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="44" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="57" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="70" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="83" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="96" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="109" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="122" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="135" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="148" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="161" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="174" y="-40" width="8" height="40" rx="3" />
    <rect class="bar" x="187" y="-40" width="8" height="40" rx="3" />
  </g>
</svg>
