<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="100%" height="80" style="background: transparent;">
  <style>
    @keyframes neonGlow {
      0% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
      50% { fill: #e8cfff; filter: drop-shadow(0 0 2px #8A2BE2) drop-shadow(0 0 15px #8A2BE2); }
      100% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
    }
    @keyframes shieldPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); fill: #00D2FF; }
    }
    .text-title {
      font-size: 28px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      animation: neonGlow 3s ease-in-out infinite;
    }
    .shield {
      animation: shieldPulse 2.5s ease-in-out infinite;
      transform-origin: 480px 45px;
    }
  </style>
  <text x="20" y="48" class="text-title">📜 License</text>
  <!-- Animated Shield Icon -->
  <g class="shield" fill="#8A2BE2" stroke="#00D2FF" stroke-width="2">
    <path d="M 480 25 C 492 25, 498 29, 498 29 L 498 47 C 498 56, 480 65, 480 65 C 480 65, 462 56, 462 47 L 462 29 C 462 29, 468 25, 480 25 Z" />
    <path d="M 473 45 L 478 50 L 488 40" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
