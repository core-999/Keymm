<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="100%" height="80" style="background: transparent;">
  <style>
    @keyframes neonGlow {
      0% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
      50% { fill: #e8cfff; filter: drop-shadow(0 0 2px #8A2BE2) drop-shadow(0 0 15px #8A2BE2); }
      100% { fill: #ffffff; filter: drop-shadow(0 0 2px #00D2FF) drop-shadow(0 0 8px #00D2FF); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; fill: #00D2FF; }
    }
    .text-title {
      font-size: 28px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      animation: neonGlow 3s ease-in-out infinite;
    }
    .chat-bubble {
      animation: pulse 2s ease-in-out infinite;
      transform-origin: 500px 40px;
    }
  </style>
  <text x="20" y="48" class="text-title">🔄 Updates &amp; Support</text>
  <!-- Animated Chat Bubble Icon -->
  <g class="chat-bubble" fill="#8A2BE2" stroke="#00D2FF" stroke-width="2">
    <path d="M 480 25 C 465 25, 455 35, 455 45 C 455 55, 465 65, 480 65 L 480 72 L 488 65 C 500 65, 505 55, 505 45 C 505 35, 500 25, 480 25 Z" />
    <circle cx="473" cy="45" r="2.5" fill="#fff" />
    <circle cx="480" cy="45" r="2.5" fill="#fff" />
    <circle cx="487" cy="45" r="2.5" fill="#fff" />
  </g>
</svg>
