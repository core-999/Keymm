start_1 : "❖ {0} သည် အလုပ်လုပ်နေဆဲ ဖြစ်ပါသည် ။\n\n<b>⌾ အလုပ်လုပ်ချိန် (Uptime) :</b> {1}"
start_2 : "<blockquote><u>မင်္ဂလာပါ {0} !\nကျွန်ုပ်သည် {1} ဖြစ်ပါသည် ,</u>\n<u>❖ သီချင်းနားထောင်ချင်ပါသလား ?</u></blockquote>\n<blockquote>➜ ကျွန်ုပ်သည် အံ့သြဖွယ်ကောင်းသော လုပ်ဆောင်ချက်များပါရှိသည့် မြန်ဆန်ပြီး စွမ်းအားပြည့်ဝသော တယ်လီဂရမ် သီချင်းဖွင့်ဘော့တ် တစ်ခု ဖြစ်ပါသည်။\n\n<u>❖ အသုံးပြုနည်းကို သိချင်ပါသလား ?</u>\n➜ ကျွန်ုပ်၏ မော်ဂျူးများနှင့် အမိန့်ပေးခိုင်းချက်များအကြောင်း သိရှိရန် အကူအညီနှင့် အမိန့်ပေးခိုင်းချက်များ ခလုတ်ကို နှိပ်ပါ။</blockquote>"
start_3 : "<blockquote>❖ မင်္ဂလာပါ {0},\nဤသည်မှာ {1} ဖြစ်ပါသည်။\n\n{2} တွင် ကျွန်ုပ်ကို ထည့်သွင်းပေးသည့်အတွက် ကျေးဇူးတင်ပါသည်၊ {3} သည် ယခုအခါ ဤချတ်တွင် သီချင်းများ ဖွင့်နိုင်ပါပြီ။</blockquote>"
start_4 : "侖 <b>စူပါဂရု (Supergroup) လိုအပ်ပါသည်</b> 侖\n\nကျေးဇူးပြု၍ သင်၏ <b>အုပ်စု (Group)</b> ကို <b>စူပါဂရု (Supergroup)</b> သို့ ပြောင်းလဲပြီးမှ ကျွန်ုပ်ကို ထပ်မံထည့်သွင်းပါ။\n\n<b>စူပါဂရု မည်သို့လုပ်ရမည်နည်း ?</b>\n- သင့်အုပ်စု၏ ချတ်မှတ်တမ်းကို တစ်ကြိမ် <b>မြင်နိုင်အောင် (Visible)</b> လုပ်ပါ။"
start_5 : "❖ <b>↝ ပိတ်ပင်ထားသော ချတ် ↜</b>\n\nဤချတ်သည် {0} ဒေတာဘေ့စ်တွင် ပိတ်ပင်ခံထားရပါသည်။\nသင့်ချတ်၏ ပိတ်ပင်မှုကို ဖြေလျှော့ရန် သို့မဟုတ် ပံ့ပိုးရေးချတ်သို့ ဝင်ရောက်ရန် <a href={1}>စူဒိုအသုံးပြုသူ</a> တစ်ဦးကို တောင်းဆိုပါ။"
start_6 : "侖 <b>သီချင်း အချက်အလက်</b> 侖\n\n侖 <b>ခေါင်းစဉ် :</b> {0}\n\n侖 <b>ကြာချိန် :</b> {1} မိနစ်\n侖 ဈေ<b>ကြည့်ရှုသူ :</b> <code>{2}</code>\n侖 <b>ထုတ်ဝေသည့်ရက် :</b> {3}\n侖 <b>ချတ်ချန်နယ် :</b> <a href={4}>{5}</a>\n\n<u><b>☉ ရှာဖွေမှုကို ပံ့ပိုးပေးသူ {6}</b></u>"

